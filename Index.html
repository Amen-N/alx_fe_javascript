<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Quote Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      padding: 20px;
    }
    #quoteDisplay {
      margin: 20px 0;
      padding: 15px;
      background: #fff;
      border-left: 4px solid #007acc;
      font-size: 1.2em;
    }
    input, button {
      margin: 5px;
      padding: 8px;
      font-size: 1em;
    }
  </style>
</head>
<body>
  <h1>Dynamic Quote Generator</h1>

  <!-- This div will show the quote -->
  <div id="quoteDisplay">Click "Show New Quote" to see something inspiring.</div>

  <!-- Button to display a new random quote -->
  <button id="showQuoteButton">Show New Quote</button>

  <h2> your quote </h2>

  <!-- Inputs to add a new quote and its category -->
  <div>
    <input id="quoteInput" type="text" placeholder="Write your quote here">
    <input id="categoryInput" type="text" placeholder="Category of the quote">
    <button id="addQuoteButton">Add Quote</button>
  </div>

  <!-- Linking the JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
